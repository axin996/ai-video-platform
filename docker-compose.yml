version: "3.9"

# ── Development Docker Compose ──────────────────────
# Full stack: PostgreSQL, Redis, MinIO, FastAPI, Celery Workers
#
# Start:  docker compose up -d
# Start with GPU: docker compose -f docker-compose.yml -f deploy/docker-compose/docker-compose.gpu.yml up -d

services:
  # ── Infrastructure ────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: aivideo-postgres
    environment:
      POSTGRES_DB: ai_video_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aivideo-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aivideo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ──────────────────────────────

  backend:
    build:
      context: .
      dockerfile: deploy/docker-compose/Dockerfile.backend
    container_name: aivideo-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_video_platform
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/ai_video_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ai-video-platform
      - MINIO_SECURE=False
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - COSYVOICE_BASE_URL=http://cosyvoice:9880
      - HEYGEM_BASE_URL=http://heygem:8081
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./workers:/workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Celery Workers ────────────────────────────

  celery-gpu-worker:
    build:
      context: .
      dockerfile: deploy/docker-compose/Dockerfile.gpu_worker
    container_name: aivideo-gpu-worker
    command: celery -A workers.gpu_worker.app worker --loglevel=info -Q pipeline_queue --concurrency=1 --prefetch-multiplier=1 -n gpu-worker@%h
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_video_platform
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ai-video-platform
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - COSYVOICE_BASE_URL=http://cosyvoice:9880
      - HEYGEM_BASE_URL=http://heygem:8081
      - TEMP_DIR=/tmp/ai-video-tasks
    volumes:
      - ./workers:/app/workers
      - ./backend:/app/backend
      - task_temp:/tmp/ai-video-tasks
      - models:/mnt/models
    depends_on:
      - redis
      - postgres
      - cosyvoice
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Comment out 'deploy' section if no GPU available — worker falls back to CPU for Whisper

  celery-upload-worker:
    build:
      context: .
      dockerfile: deploy/docker-compose/Dockerfile.uploader
    container_name: aivideo-upload-worker
    command: celery -A workers.upload_worker.app worker --loglevel=info -Q upload_queue --concurrency=2 --prefetch-multiplier=1 -n uploader@%h
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@5432/ai_video_platform
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - CHROME_PATH=/usr/bin/google-chrome
      - CHROME_DEBUG_PORT=9222
    volumes:
      - ./workers:/app/workers
      - ./backend:/app/backend
      - task_temp:/tmp/ai-video-tasks
    depends_on:
      - redis
      - postgres

  # ── AI Services ─────────────────────────────

  cosyvoice:
    build:
      context: ./services/cosyvoice
      dockerfile: Dockerfile
    container_name: aivideo-cosyvoice
    ports:
      - "9880:9880"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Comment out 'deploy' if no GPU

  # ── Monitoring ──────────────────────────────

  flower:
    image: mher/flower:2.0
    container_name: aivideo-flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
  task_temp:
  models:
